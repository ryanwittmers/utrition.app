name: Mirror to deployment fork

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to ryanwittmers/utrition.app
        run: |
          git remote add fork https://x-access-token:${{ secrets.FORK_PAT }}@github.com/ryanwittmers/utrition.app.git
          git push fork main:main
